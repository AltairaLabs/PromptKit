# SonarCloud configuration for PromptKit
sonar.projectKey=AltairaLabs_PromptKit
sonar.organization=altairalabs

# Project metadata
sonar.projectName=PromptKit
sonar.projectVersion=1.0

# Source configuration - Include Go, TypeScript, and JavaScript production source files
# `server` covers the shipped server/a2a module (previously analysed by nothing —
# its coverage was uploaded but never mapped because the tree wasn't a source).
sonar.sources=sdk,runtime,pkg,server
sonar.inclusions=**/*.go,**/*.ts,**/*.js
# The *_interactive.go / *_integration.go suffix is NOT an exclusion pattern.
# Files that legitimately can't be covered in CI (thin live-I/O glue, test
# harnesses) are NOT excluded from analysis — they are production code that
# ships and must be bug/security-analysed. They are only exempt from the
# COVERAGE requirement, via the explicit sonar.coverage.exclusions allowlist
# below. A new *_integration.go is analysed and coverage-gated unless it is
# deliberately added to that list.
sonar.exclusions=**/*_test.go,**/test_*.go,**/*.test.ts,**/*.test.js,**/tests/**,**/testdata/**,**/vendor/**,**/bin/**,**/docs/**,**/*.md,**/.git/**,**/node_modules/**,**/examples/**,**/*example*/**,**/.vscode/**,**/.scannerwork/**,**/__mocks__/**,**/dist/**,**/coverage/**,**/jest.config.js,**/jest.config.ts

# Test files completely excluded from analysis
# sonar.tests=.
# sonar.test.inclusions=**/*_test.go
# sonar.test.exclusions=**/vendor/**

# Go specific settings
sonar.go.coverage.reportPaths=coverage.out
sonar.go.golangci-lint.reportPaths=golangci-lint-report.json


# Coverage exclusions — EXPLICIT allowlist, not a suffix glob. Each entry is
# either thin live-I/O glue that cannot run in CI (real network/websocket to a
# provider, ffmpeg subprocess, cloud-SDK credential fetch) or a cross-package
# test harness. Pure/testable logic must be extracted into a gated sibling and
# covered — the *_interactive.go / *_integration.go suffix does NOT grant a
# coverage exemption by itself. Adding a file here should be a reviewed decision.
# Keeps: example code, platform-specific files (CI runs on Linux), TS mocks/dist.
sonar.coverage.exclusions=**/examples/**,**/*example*/**,**/*_windows.go,**/*_darwin.go,**/__mocks__/**,**/dist/**,runtime/credentials/aws_integration.go,runtime/credentials/azure_integration.go,runtime/credentials/gcp_integration.go,runtime/media/audio_converter_integration.go,runtime/pipeline/stage/stages_video_frames_integration.go,runtime/providers/gemini/stream_session_integration.go,runtime/providers/gemini/stream_session_protocol_integration.go,runtime/providers/gemini/stream_session_tools_integration.go,runtime/providers/openai/openai_responses_integration.go,runtime/providers/openai/realtime_session_integration.go,runtime/providers/openai/realtime_tools_integration.go,runtime/providers/openai/realtime_websocket_integration.go,runtime/providers/openai/streaming_support_integration.go,runtime/providers/provider_contract_integration.go,runtime/skills/installer_integration.go,runtime/tts/cartesia_interactive.go

# Duplication exclusions - fan-in accumulator stages share intentional design pattern code
# GitHub Actions runner files have similar patterns across actions
# Provider tool/streaming implementations share interface-mandated patterns
# Persistence repository implementations share interface-mandated patterns (JSON/YAML/memory)
sonar.cpd.exclusions=**/runtime/pipeline/stage/stages_video_frames.go,**/runtime/pipeline/stage/stages_media_compose.go,**/runtime/providers/openai/openai_tools.go,**/runtime/providers/claude/claude_tools.go,**/runtime/providers/gemini/gemini_tools.go,**/runtime/providers/ollama/ollama_tools.go,**/runtime/providers/claude/claude_streaming.go,**/runtime/providers/gemini/gemini_streaming.go,**/runtime/persistence/yaml/yaml_tool.go,**/runtime/persistence/json/json.go

# Function-level coverage exclusions using patterns
# e7: Disable TODO comment rule globally (S1135) - TODOs are tracked in project management
# e8: Disable godre:S8148 rule globally
# e9: Disable godre:S8177 rule globally
# e10: Disable godre:S8179 rule globally
# e11: Disable godre:S1172 (unused parameters) - rely on golangci-lint/unparam instead
sonar.issue.ignore.multicriteria=e7,e8,e9,e10,e11,e14,e17,e18,e19,e20,e21,e22,e23
# e14/e17: suppress cognitive-complexity (S3776) on live-I/O glue (interactive/
# integration files) — provider session loops and protocol handlers are
# irreducibly branchy. The InsufficientLineCoverage/BranchCoverage ignores that
# used to sit here for these suffixes were removed: they are redundant now that
# the coverage gate is driven by the sonar.coverage.exclusions allowlist, and a
# non-exempt *_integration.go MUST be coverage-gated, not waved through.
sonar.issue.ignore.multicriteria.e14.ruleKey=go:S3776
sonar.issue.ignore.multicriteria.e14.resourceKey=**/*_interactive.go
sonar.issue.ignore.multicriteria.e17.ruleKey=go:S3776
sonar.issue.ignore.multicriteria.e17.resourceKey=**/*_integration.go
sonar.issue.ignore.multicriteria.e7.ruleKey=go:S1135
sonar.issue.ignore.multicriteria.e7.resourceKey=**/*.go
sonar.issue.ignore.multicriteria.e8.ruleKey=godre:S8148
sonar.issue.ignore.multicriteria.e8.resourceKey=**/*.go
sonar.issue.ignore.multicriteria.e9.ruleKey=godre:S8177
sonar.issue.ignore.multicriteria.e9.resourceKey=**/*.go
sonar.issue.ignore.multicriteria.e10.ruleKey=godre:S8179
sonar.issue.ignore.multicriteria.e10.resourceKey=**/*.go
sonar.issue.ignore.multicriteria.e11.ruleKey=godre:S1172
sonar.issue.ignore.multicriteria.e11.resourceKey=**/*.go
# e18-e23: Security hotspots on interactive files (local development tools)
sonar.issue.ignore.multicriteria.e18.ruleKey=go:S4823
sonar.issue.ignore.multicriteria.e18.resourceKey=**/*_interactive.go
sonar.issue.ignore.multicriteria.e19.ruleKey=go:S4797
sonar.issue.ignore.multicriteria.e19.resourceKey=**/*_interactive.go
sonar.issue.ignore.multicriteria.e20.ruleKey=go:S5131
sonar.issue.ignore.multicriteria.e20.resourceKey=**/*_interactive.go
sonar.issue.ignore.multicriteria.e21.ruleKey=go:S2245
sonar.issue.ignore.multicriteria.e21.resourceKey=**/*_interactive.go
sonar.issue.ignore.multicriteria.e22.ruleKey=go:S4790
sonar.issue.ignore.multicriteria.e22.resourceKey=**/*_interactive.go
sonar.issue.ignore.multicriteria.e23.ruleKey=go:S5122
sonar.issue.ignore.multicriteria.e23.resourceKey=**/*_interactive.go

# Quality gate settings
sonar.qualitygate.wait=true