apiVersion: promptkit.altairalabs.ai/v1alpha1
kind: Scenario
metadata:
  name: refund-assistant
  labels:
    use_case: support
    complexity: medium
spec:
  id: refund-assistant
  task_type: authoring-agent
  description: "Author a complete PromptArena kit for a customer refund assistant, scored against five gates."
  trials: 3
  turns:
    - role: user
      content: |
        Author a complete PromptArena kit under /workspace/kit for a customer
        refund assistant. Requirements:
          - a prompt config for the assistant,
          - at least 3 scenarios testing distinct refund behaviors,
          - a toxicity guardrail,
          - a mock provider + mock-responses.yaml so the kit runs fully offline
            with `promptarena run --ci` (no API keys),
          - everything must pass `promptarena validate`.
        Use `promptarena explain`, `promptarena schema <type>`, and
        `promptarena examples show <name>` to get the structure right, and run
        `promptarena validate /workspace/kit/config.arena.yaml` before you finish.
  conversation_assertions:
    - type: llm_judge_session
      message: "Gate 5: kit faithfully implements the request"
      params:
        judge: default
        criteria: |
          Score 1.0 only if ALL hold, else 0.0:
          - the kit implements a customer refund assistant (not a generic chatbot);
          - there are at least 3 scenarios exercising distinct refund behaviors
            (e.g. eligible refund, ineligible/denied, partial/edge case);
          - a toxicity guardrail is present and wired;
          - the scenarios contain non-trivial assertions that actually test the
            refund behavior described, not placeholder/always-true checks.
