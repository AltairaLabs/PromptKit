apiVersion: promptkit.altairalabs.ai/v1alpha1
kind: Scenario
metadata:
  name: code-reviewer
  labels:
    use_case: devtools
    complexity: medium
spec:
  id: code-reviewer
  task_type: authoring-agent
  description: "Author a complete PromptArena kit for a code-review assistant, scored against five gates."
  trials: 3
  turns:
    - role: user
      content: |
        Author a complete PromptArena kit under /workspace/kit for a code-review
        assistant. Requirements:
          - a prompt config for the code-review assistant,
          - at least 2 scenarios: one where the assistant catches a bug, and one
            where it flags a style issue (nit),
          - a structured-output assertion that verifies the assistant returns
            findings in a consistent format (e.g. JSON with severity and line fields,
            or a predictable text structure),
          - a mock provider + mock-responses.yaml so the kit runs fully offline
            with `promptarena run --ci` (no API keys),
          - everything must pass `promptarena validate`.
        Use `promptarena explain`, `promptarena schema <type>`, and
        `promptarena examples show <name>` to get the structure right, and run
        `promptarena validate /workspace/kit/config.arena.yaml` before you finish.
  conversation_assertions:
    - type: llm_judge_session
      message: "Gate 5: kit faithfully implements the code-review assistant request"
      params:
        judge: default
        criteria: |
          Score 1.0 only if ALL hold, else 0.0:
          - the kit implements a code-review assistant (not a generic chatbot);
          - there are at least 2 scenarios: one targeting a bug and one targeting
            a style/nit issue, exercising distinct review behaviors;
          - a structured-output assertion is present that verifies the reviewer
            returns findings in a consistent format (e.g. JSON with fields like
            severity/line, or a predictable labelled structure);
          - the assertions are non-trivial and test the specific review behaviors
            described, not placeholder/always-true checks;
          - the kit includes a mock provider so it runs fully offline.
