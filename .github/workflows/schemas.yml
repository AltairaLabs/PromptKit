name: Schema Validation

on:
  push:
    branches: [ main ]
    paths:
      - 'pkg/config/**'
      - 'tools/schema-gen/**'
      - 'schemas/**/*.json'
      - 'runtime/prompt/schema/**'
      - '.github/workflows/schemas.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'pkg/config/**'
      - 'tools/schema-gen/**'
      - 'schemas/**/*.json'
      - 'runtime/prompt/schema/**'
      - '.github/workflows/schemas.yml'

permissions:
  contents: read
  pull-requests: write

jobs:
  validate-schemas:
    name: Validate JSON Schemas
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    
    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: '1.26.0'
    
    - name: Install dependencies
      run: |
        go work sync
        cd tools/schema-gen && go mod download
    
    - name: Check if schemas are up to date
      run: make schemas-check
    
    - name: Generate schemas (if check failed)
      if: failure()
      run: |
        echo "::error::Schemas are out of date. Run 'make schemas' locally and commit the changes."
        make schemas
        echo "Expected schemas:"
        find schemas -name "*.json" -type f
    
    - name: Test schema generator
      run: |
        echo "Running schema generator tests..."
        cd tools/schema-gen
        go test -v -coverprofile=coverage.out ./...
        go tool cover -func=coverage.out | grep total

  check-promptpack-schema:
    name: Check PromptPack Schema Freshness
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Fetch upstream PromptPack schema
      run: |
        curl -sf --max-time 30 \
          https://promptpack.org/schema/latest/promptpack.schema.json \
          -o /tmp/upstream-schema.json

    - name: Compare with embedded schema
      run: |
        EMBEDDED="runtime/prompt/schema/promptpack.schema.json"
        if ! diff -q "$EMBEDDED" /tmp/upstream-schema.json > /dev/null 2>&1; then
          EMBEDDED_VER=$(python3 -c "import json; print(json.load(open('$EMBEDDED')).get('version','unknown'))")
          UPSTREAM_VER=$(python3 -c "import json; print(json.load(open('/tmp/upstream-schema.json')).get('version','unknown'))")
          echo "::warning::Embedded PromptPack schema ($EMBEDDED_VER) differs from upstream ($UPSTREAM_VER). Run: curl -o $EMBEDDED https://promptpack.org/schema/latest/promptpack.schema.json"
        else
          echo "✓ Embedded PromptPack schema is up to date"
        fi

