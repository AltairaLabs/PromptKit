name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v1.0.0)'
        required: true
        type: string
      phase:
        description: 'Release phase'
        required: true
        type: choice
        options:
          - full
          - libs-only
          - tools-only
        default: full
      skip_tests:
        description: 'Skip running tests'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.validate.outputs.version }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        fetch-depth: 0

    - name: Install ALSA dev headers (Linux)
      if: runner.os == 'Linux' && inputs.skip_tests != true
      run: sudo apt-get update && sudo apt-get install -y libasound2-dev

    - name: Validate version format
      id: validate
      env:
        INPUT_VERSION: ${{ inputs.version }}
      run: |
        VERSION="$INPUT_VERSION"
        
        # Ensure version starts with 'v'
        if [[ ! $VERSION =~ ^v ]]; then
          VERSION="v$VERSION"
        fi
        
        # Validate semver format
        if [[ ! $VERSION =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "::error::Version must be in format v1.0.0"
          exit 1
        fi
        
        # Check if version already exists (allow re-running tools-only releases)
        if git tag -l | grep -q "^$VERSION$\|^runtime/$VERSION$"; then
          if [ "${{ inputs.phase }}" = "tools-only" ]; then
            echo "⚠ Version $VERSION already exists, but proceeding with tools-only release"
          else
            echo "::error::Version $VERSION already exists"
            exit 1
          fi
        fi
        
        # Get latest version and compare
        echo "Checking if $VERSION is newer than existing versions..."
        LATEST_TAG=$(git tag -l "runtime/v*" | sort -V | tail -n1)
        
        if [ -n "$LATEST_TAG" ]; then
          LATEST_VERSION="${LATEST_TAG#runtime/}"
          echo "Latest existing version: $LATEST_VERSION"
          echo "New version: $VERSION"
          
          # Extract version numbers for comparison
          LATEST_MAJOR=$(echo "$LATEST_VERSION" | cut -d. -f1 | sed 's/v//')
          LATEST_MINOR=$(echo "$LATEST_VERSION" | cut -d. -f2)
          LATEST_PATCH=$(echo "$LATEST_VERSION" | cut -d. -f3)
          
          NEW_MAJOR=$(echo "$VERSION" | cut -d. -f1 | sed 's/v//')
          NEW_MINOR=$(echo "$VERSION" | cut -d. -f2)
          NEW_PATCH=$(echo "$VERSION" | cut -d. -f3)
          
          # Compare versions
          if [ "$NEW_MAJOR" -lt "$LATEST_MAJOR" ]; then
            echo "::error::New version $VERSION is older than latest $LATEST_VERSION (major version is lower)"
            exit 1
          elif [ "$NEW_MAJOR" -eq "$LATEST_MAJOR" ] && [ "$NEW_MINOR" -lt "$LATEST_MINOR" ]; then
            echo "::error::New version $VERSION is older than latest $LATEST_VERSION (minor version is lower)"
            exit 1
          elif [ "$NEW_MAJOR" -eq "$LATEST_MAJOR" ] && [ "$NEW_MINOR" -eq "$LATEST_MINOR" ] && [ "$NEW_PATCH" -le "$LATEST_PATCH" ]; then
            echo "::error::New version $VERSION is not newer than latest $LATEST_VERSION (patch version is not higher)"
            exit 1
          fi
          
          echo "✓ Version $VERSION is newer than $LATEST_VERSION"
        else
          echo "✓ No existing versions found, this will be the first release"
        fi
        
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "✓ Version $VERSION is valid and available"
    
    - name: Setup Go
      if: ${{ !inputs.skip_tests }}
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
      with:
        go-version: '1.26.0'
        cache: false  # Disable cache since we use a workspace setup
    
    - name: Install dependencies
      if: ${{ !inputs.skip_tests }}
      run: make install
    
    - name: Generate schemas for tests
      if: ${{ !inputs.skip_tests }}
      run: make schemas-copy
    
    - name: Run tests
      if: ${{ !inputs.skip_tests }}
      run: |
        echo "Running full test suite..."
        make test
        make test-race
        echo "✓ All tests passed"

  tag-dependencies:
    name: Tag Libraries
    runs-on: ubuntu-latest
    needs: validate
    if: ${{ inputs.phase == 'full' || inputs.phase == 'libs-only' }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        fetch-depth: 0
    
    - name: Configure Git
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

    - name: Fetch remote tags
      # See update-tools/Fetch remote tags for rationale.
      run: git fetch --tags --force origin

    - name: Tag runtime
      env:
        VERSION: ${{ needs.validate.outputs.version }}
      run: |
        echo "Tagging runtime/$VERSION"
        if git rev-parse "runtime/$VERSION" >/dev/null 2>&1; then
          echo "⚠ Tag runtime/$VERSION already exists, skipping"
        else
          git tag -a "runtime/$VERSION" -m "Release runtime $VERSION"
          git push origin "runtime/$VERSION"
          echo "✓ Tagged runtime/$VERSION"
        fi
    
    - name: Tag pkg
      env:
        VERSION: ${{ needs.validate.outputs.version }}
      run: |
        echo "Tagging pkg/$VERSION"
        if git rev-parse "pkg/$VERSION" >/dev/null 2>&1; then
          echo "⚠ Tag pkg/$VERSION already exists, skipping"
        else
          git tag -a "pkg/$VERSION" -m "Release pkg $VERSION"
          git push origin "pkg/$VERSION"
          echo "✓ Tagged pkg/$VERSION"
        fi
    
    - name: Tag root version (for GoReleaser)
      env:
        VERSION: ${{ needs.validate.outputs.version }}
      run: |
        echo "Tagging $VERSION (root-level for GoReleaser/releases)"
        if git rev-parse "$VERSION" >/dev/null 2>&1; then
          echo "⚠ Tag $VERSION already exists, skipping"
        else
          git tag -a "$VERSION" -m "Release $VERSION"
          git push origin "$VERSION"
          echo "✓ Tagged $VERSION"
        fi
    
    - name: Verify on Go proxy
      env:
        VERSION: ${{ needs.validate.outputs.version }}
      run: |
        echo "Verifying tags are available on Go proxy..."
        
        # Function to check if a module version is available
        check_module() {
          local module=$1
          local version=$2
          echo "Checking $module..."
          for i in {1..10}; do
            if curl -f -s "https://proxy.golang.org/github.com/!altaira!labs/!prompt!kit/$module/@v/$version.info" >/dev/null 2>&1; then
              echo "✓ $module@$version is available"
              return 0
            fi
            echo "  Attempt $i/10: Not available yet, waiting 20s..."
            sleep 20
          done
          echo "⚠ $module@$version still not available after 200s"
          return 1
        }
        
        # Check leaf modules (runtime and pkg have no replace directives)
        # server/a2a and sdk are tagged later in update-tools after go.mod cleanup
        check_module "runtime" "$VERSION" &
        PID_RUNTIME=$!

        check_module "pkg" "$VERSION" &
        PID_PKG=$!

        # Wait for all checks to complete
        wait $PID_RUNTIME
        RESULT_RUNTIME=$?

        wait $PID_PKG
        RESULT_PKG=$?

        # Report overall status (non-blocking - Go proxy can take time to propagate)
        if [ $RESULT_RUNTIME -eq 0 ] && [ $RESULT_PKG -eq 0 ]; then
          echo "✓ Leaf modules are available on Go proxy"
        else
          echo "⚠ Some modules may need more time to propagate"
          echo "  This is normal and they will be available shortly"
          echo "  Continuing with release process..."
        fi
        
        # Always succeed - Go proxy propagation shouldn't block the release
        exit 0

  update-tools:
    name: Update and Tag SDK Modules
    runs-on: ubuntu-latest
    needs: [validate, tag-dependencies]
    if: ${{ always() && (inputs.phase == 'full' || inputs.phase == 'tools-only') && needs.validate.result == 'success' }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        fetch-depth: 0

    - name: Install ALSA dev headers (Linux)
      if: runner.os == 'Linux'
      run: sudo apt-get update && sudo apt-get install -y libasound2-dev

    - name: Setup Go
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
      with:
        go-version: '1.26.0'
        cache: false  # Disable cache since we use a workspace setup

    - name: Configure Git
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

    - name: Fetch remote tags
      # Ensure local tag state reflects the remote. Without this, the per-tag
      # `git rev-parse "<tag>" >/dev/null 2>&1` checks miss tags that exist on
      # remote but weren't pulled into the local clone — which causes the
      # workflow to try to create+push tags that already exist remotely and
      # fail with "remote rejected" / "remote: fatal error in commit_refs".
      run: git fetch --tags --force origin

    - name: Create release branch
      env:
        VERSION: ${{ needs.validate.outputs.version }}
      run: |
        BRANCH="release/tools/$VERSION"
        # Check if branch already exists remotely
        if git ls-remote --heads origin "$BRANCH" | grep -q "$BRANCH"; then
          echo "⚠ Branch $BRANCH already exists, checking it out"
          git fetch origin "$BRANCH"
          git checkout "$BRANCH"
        else
          git checkout -b "$BRANCH"
          echo "✓ Created branch $BRANCH"
        fi
    
    - name: Update server/a2a dependencies
      env:
        VERSION: ${{ needs.validate.outputs.version }}
      run: |
        echo "Updating server/a2a to use $VERSION..."
        cd server/a2a

        # Update go.mod to require new versions
        echo "Setting required versions to $VERSION..."
        go mod edit -require="github.com/AltairaLabs/PromptKit/runtime@$VERSION"

        # Remove local replace directives
        go mod edit -dropreplace=github.com/AltairaLabs/PromptKit/runtime

        cd ../..
        echo "✓ Updated server/a2a go.mod to $VERSION"

    - name: Update sdk dependencies
      env:
        VERSION: ${{ needs.validate.outputs.version }}
      run: |
        echo "Updating sdk to use $VERSION..."
        cd sdk

        # Update go.mod to require new versions
        echo "Setting required versions to $VERSION..."
        go mod edit -require="github.com/AltairaLabs/PromptKit/runtime@$VERSION"
        go mod edit -require="github.com/AltairaLabs/PromptKit/pkg@$VERSION"
        go mod edit -require="github.com/AltairaLabs/PromptKit/server/a2a@$VERSION"

        # Remove local replace directives
        go mod edit -dropreplace=github.com/AltairaLabs/PromptKit/runtime
        go mod edit -dropreplace=github.com/AltairaLabs/PromptKit/server/a2a

        cd ..
        echo "✓ Updated sdk go.mod to $VERSION"

    - name: Commit changes
      env:
        VERSION: ${{ needs.validate.outputs.version }}
      run: |
        BRANCH="release/tools/$VERSION"

        # Check if there are changes to commit
        if git diff --quiet server/a2a/go.mod server/a2a/go.sum sdk/go.mod sdk/go.sum; then
          echo "⚠ No changes to commit (already up to date)"
        else
          git add server/a2a/go.mod server/a2a/go.sum
          git add sdk/go.mod sdk/go.sum
          git commit -m "release: update modules to $VERSION"
          git push origin "$BRANCH"
          echo "✓ Pushed $BRANCH"
        fi
    
    - name: Tag server/a2a
      env:
        VERSION: ${{ needs.validate.outputs.version }}
      run: |
        echo "Tagging server/a2a/$VERSION from release branch (replace directives removed)"
        if git rev-parse "server/a2a/$VERSION" >/dev/null 2>&1; then
          echo "⚠ Tag server/a2a/$VERSION already exists, skipping"
        else
          git tag -a "server/a2a/$VERSION" -m "Release server/a2a $VERSION"
          git push origin "server/a2a/$VERSION"
          echo "✓ Tagged server/a2a/$VERSION"
        fi

    - name: Tag sdk
      env:
        VERSION: ${{ needs.validate.outputs.version }}
      run: |
        echo "Tagging sdk/$VERSION from release branch (replace directives removed)"
        if git rev-parse "sdk/$VERSION" >/dev/null 2>&1; then
          echo "⚠ Tag sdk/$VERSION already exists, skipping"
        else
          git tag -a "sdk/$VERSION" -m "Release sdk $VERSION"
          git push origin "sdk/$VERSION"
          echo "✓ Tagged sdk/$VERSION"
        fi

    - name: Verify library modules on Go proxy
      env:
        VERSION: ${{ needs.validate.outputs.version }}
      continue-on-error: true
      run: |
        echo "Verifying library modules are available on Go proxy..."

        check_module() {
          local module=$1
          local version=$2
          echo "Checking $module..."
          for i in {1..10}; do
            if curl -f -s "https://proxy.golang.org/github.com/!altaira!labs/!prompt!kit/$module/@v/$version.info" >/dev/null 2>&1; then
              echo "✓ $module@$version is available"
              return 0
            fi
            echo "  Attempt $i/10: Not available yet, waiting 20s..."
            sleep 20
          done
          echo "⚠ $module@$version still not available after 200s"
          return 1
        }

        check_module "server/a2a" "$VERSION" &
        PID_SERVER_A2A=$!

        check_module "sdk" "$VERSION" &
        PID_SDK=$!

        wait $PID_SERVER_A2A
        wait $PID_SDK

        echo "Library module verification complete"

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [validate, tag-dependencies]
    if: ${{ inputs.phase == 'full' }}

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        fetch-depth: 0

    # PromptKit ships Go library modules only (runtime/pkg/sdk/server-a2a),
    # consumed via `go get` from the tags created above — there are no binaries
    # to build. Create a draft GitHub release with auto-generated notes; the
    # verify-docs job publishes it with a PAT to trigger schema/docs deployment.
    - name: Create draft GitHub release
      env:
        GH_TOKEN: ${{ github.token }}
        VERSION: ${{ needs.validate.outputs.version }}
        GITHUB_REPO: ${{ github.repository }}
      run: |
        echo "Creating draft release $VERSION (libraries only — no binaries)..."
        if gh release view "$VERSION" --repo "$GITHUB_REPO" >/dev/null 2>&1; then
          echo "⚠ Release $VERSION already exists, skipping create"
        else
          gh release create "$VERSION" \
            --repo "$GITHUB_REPO" \
            --title "PromptKit $VERSION" \
            --generate-notes \
            --draft
          echo "✓ Draft release $VERSION created"
        fi

    - name: Release summary
      run: |
        echo "## 📦 Draft Release Created" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "PromptKit ships Go library modules (no binaries)." >> $GITHUB_STEP_SUMMARY
        echo "A draft GitHub release with auto-generated notes was created for ${{ needs.validate.outputs.version }}." >> $GITHUB_STEP_SUMMARY
        echo "The verify-docs job publishes it to trigger schema/docs deployment." >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Review at:** https://github.com/${{ github.repository }}/releases" >> $GITHUB_STEP_SUMMARY

  verify-docs:
    name: Verify Docs Deployment
    runs-on: ubuntu-latest
    needs: [validate, create-release]
    if: ${{ inputs.phase == 'full' && needs.create-release.result == 'success' }}

    steps:
    - name: Publish draft release
      env:
        GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        VERSION: ${{ needs.validate.outputs.version }}
        GITHUB_REPO: ${{ github.repository }}
      run: |
        echo "Publishing draft release $VERSION..."
        gh release edit "$VERSION" --repo "$GITHUB_REPO" --draft=false
        echo "✓ Release $VERSION published"

    - name: Wait for docs deployment
      env:
        GH_TOKEN: ${{ github.token }}
        GITHUB_REPO: ${{ github.repository }}
      run: |
        echo "Waiting for docs deployment to start..."
        sleep 30

        # Find the docs workflow run triggered by this release
        for i in {1..10}; do
          RUN_ID=$(gh run list --repo "$GITHUB_REPO" --workflow docs.yml --limit 1 --json databaseId,event,status --jq '.[0] | select(.event == "release") | .databaseId')
          if [ -n "$RUN_ID" ]; then
            echo "Found docs workflow run: $RUN_ID"
            break
          fi
          echo "Attempt $i/10: Docs workflow not started yet, waiting 15s..."
          sleep 15
        done

        if [ -z "$RUN_ID" ]; then
          echo "::error::Docs workflow did not start after release publish"
          exit 1
        fi

        echo "Watching docs workflow run $RUN_ID..."
        if gh run watch "$RUN_ID" --repo "$GITHUB_REPO" --exit-status; then
          echo "✓ Docs deployed successfully"
        else
          echo "::error::Docs deployment failed — schemas may not be published"
          echo "Re-run the docs workflow manually: gh workflow run docs.yml"
          exit 1
        fi

  notify-downstream:
    name: Notify Downstream Repos
    runs-on: ubuntu-latest
    needs: [validate, tag-dependencies]
    if: ${{ needs.tag-dependencies.result == 'success' }}

    steps:
    - name: Dispatch to promptarena-deploy-agentcore
      continue-on-error: true
      env:
        VERSION: ${{ needs.validate.outputs.version }}
        GH_TOKEN: ${{ secrets.DOWNSTREAM_DISPATCH_TOKEN }}
      run: |
        echo "Notifying promptarena-deploy-agentcore of runtime/$VERSION..."
        gh api repos/AltairaLabs/promptarena-deploy-agentcore/dispatches \
          -f event_type=promptkit-release \
          -f "client_payload[version]=$VERSION"
        echo "✓ Dispatched to promptarena-deploy-agentcore"

    - name: Dispatch to promptarena-deploy-omnia
      continue-on-error: true
      env:
        VERSION: ${{ needs.validate.outputs.version }}
        GH_TOKEN: ${{ secrets.DOWNSTREAM_DISPATCH_TOKEN }}
      run: |
        echo "Notifying promptarena-deploy-omnia of runtime/$VERSION..."
        gh api repos/AltairaLabs/PromptArena-deploy-omnia/dispatches \
          -f event_type=promptkit-release \
          -f "client_payload[version]=$VERSION"
        echo "✓ Dispatched to promptarena-deploy-omnia"

  summary:
    name: Release Summary
    runs-on: ubuntu-latest
    needs: [validate, tag-dependencies, update-tools, create-release, verify-docs, notify-downstream]
    if: always()
    
    steps:
    - name: Generate summary
      env:
        VERSION: ${{ needs.validate.outputs.version }}
        VALIDATION_RESULT: ${{ needs.validate.result }}
        DEPENDENCIES_RESULT: ${{ needs.tag-dependencies.result }}
        TOOLS_RESULT: ${{ needs.update-tools.result }}
        RELEASE_RESULT: ${{ needs.create-release.result }}
        DOCS_RESULT: ${{ needs.verify-docs.result }}
        DOWNSTREAM_RESULT: ${{ needs.notify-downstream.result }}
        GITHUB_REPO: ${{ github.repository }}
      run: |
        cat >> $GITHUB_STEP_SUMMARY << EOF
        # Release $VERSION Summary

        ## Status

        - Validation: $VALIDATION_RESULT
        - Dependencies: $DEPENDENCIES_RESULT
        - SDK Modules: $TOOLS_RESULT
        - GitHub Release: $RELEASE_RESULT
        - Docs Deployment: $DOCS_RESULT
        - Downstream Notification: $DOWNSTREAM_RESULT

        ## Installation

        PromptKit ships Go library modules only. The PromptArena and PackC CLIs
        now live in [github.com/AltairaLabs/promptarena](https://github.com/AltairaLabs/promptarena).

        **SDK Library:**
        \`\`\`bash
        go get github.com/AltairaLabs/PromptKit/sdk@$VERSION
        go get github.com/AltairaLabs/PromptKit/runtime@$VERSION
        \`\`\`

        ## Next Steps

        1. Verify the [published release](https://github.com/$GITHUB_REPO/releases)
        2. Announce the release
        EOF
