name: CI

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'LICENSE'
      - '.gitignore'
      - '.github/workflows/docs.yml'
      - '.github/workflows/release.yml'
      - '.github/CODEOWNERS'
      - 'scripts/setup-branch-protection.sh'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'LICENSE'
      - '.gitignore'
      - '.github/workflows/docs.yml'
      - '.github/workflows/release.yml'
      - '.github/CODEOWNERS'
      - 'scripts/setup-branch-protection.sh'

permissions:
  contents: read
  actions: read
  checks: write
  pull-requests: write

env:
  # Prefer local JSON Schemas during CI to avoid stale remote downloads
  PROMPTKIT_SCHEMA_SOURCE: local

jobs:
  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    env:
      PROMPTKIT_SCHEMA_SOURCE: local
    strategy:
      matrix:
        go-version: ['1.26.0']
    
    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        fetch-depth: 0  # Shallow clones should be disabled for better relevancy of analysis

    - name: Install ALSA dev headers (Linux)
      if: runner.os == 'Linux'
      run: sudo apt-get update && sudo apt-get install -y libasound2-dev

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: ${{ matrix.go-version }}

    - name: Install dependencies
      run: make install
    
    - name: Generate schemas for tests
      run: make schemas-copy
    
    - name: Install gotestsum
      run: go install gotest.tools/gotestsum@latest
    
    - name: Run tests with coverage and race detector
      run: |
        echo "Running tests with coverage and race detection..."
        mkdir -p test-results
        # Run tests with race detector and generate coverage + JUnit output
        gotestsum --junitfile test-results/coverage-runtime.xml --format testname -- -race -coverprofile=runtime/runtime-coverage.out ./runtime/...
        gotestsum --junitfile test-results/coverage-sdk.xml --format testname -- -race -coverprofile=sdk/sdk-coverage.out ./sdk/...
        gotestsum --junitfile test-results/coverage-pkg.xml --format testname -- -race -coverprofile=pkg/pkg-coverage.out ./pkg/...
        gotestsum --junitfile test-results/coverage-server-a2a.xml --format testname -- -race -coverprofile=server/a2a/server-a2a-coverage.out ./server/a2a/...
        gotestsum --junitfile test-results/coverage-sdk-integration.xml --format testname -- -race -coverpkg=github.com/AltairaLabs/PromptKit/sdk/... -coverprofile=sdk/sdk-integration-coverage.out ./sdk/integration/...

        # Merge coverage files
        echo "mode: set" > coverage.out
        grep -h -v "^mode:" runtime/runtime-coverage.out sdk/sdk-coverage.out sdk/sdk-integration-coverage.out pkg/pkg-coverage.out server/a2a/server-a2a-coverage.out >> coverage.out 2>/dev/null || true

        # Fix coverage paths for SonarCloud - strip module prefix to get repo-relative paths
        # Go coverage uses full module paths (github.com/AltairaLabs/PromptKit/...) but SonarCloud expects repo-relative paths
        sed -i 's|github.com/AltairaLabs/PromptKit/||g' coverage.out
        echo "Coverage report generated with $(wc -l < coverage.out) lines"
        echo "Sample paths:"
        head -5 coverage.out
    
    - name: Publish Test Results  
      uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
      if: always()
      with:
        name: Test Results
        path: 'test-results/*.xml'
        reporter: java-junit
        fail-on-error: false
    
    - name: Upload coverage artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: coverage-report
        path: |
          coverage.out
          runtime/runtime-coverage.out
          sdk/sdk-coverage.out
          sdk/sdk-integration-coverage.out
          pkg/pkg-coverage.out
         
          server/a2a/server-a2a-coverage.out
        retention-days: 5

  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: github.actor != 'dependabot[bot]'

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        fetch-depth: 0  # Shallow clones should be disabled for better relevancy of analysis

    - name: Download Go coverage artifacts
      uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
      with:
        name: coverage-report

    - name: Verify coverage files
      run: |
        echo "=== Go Coverage ==="
        ls -la *.out 2>/dev/null || echo "No .out files in root"
        ls -la coverage.out 2>/dev/null || echo "coverage.out not found"
        wc -l coverage.out 2>/dev/null || echo "Cannot read coverage.out"

    - name: SonarCloud Scan
      uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8.2.0
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
  
  integration-tests:
    name: SDK Integration Tests
    runs-on: ubuntu-latest
    env:
      PROMPTKIT_SCHEMA_SOURCE: local

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: '1.26.0'

    - name: Install gotestsum
      run: go install gotest.tools/gotestsum@latest

    - name: Run SDK integration tests
      run: |
        mkdir -p test-results
        gotestsum --junitfile test-results/integration.xml --format testname -- -race -v -count=1 -coverpkg=github.com/AltairaLabs/PromptKit/sdk/... -coverprofile=sdk-integration-coverage.out ./sdk/integration/...

    - name: Publish Integration Test Results
      uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
      if: always()
      with:
        name: SDK Integration Tests
        path: test-results/integration.xml
        reporter: java-junit
        fail-on-error: true

  lint:
    name: Lint
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    strategy:
      matrix:
        module:
          - ./runtime
          - ./sdk
          - ./pkg
          - ./server/a2a

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        fetch-depth: 0  # Needed for diff-based linting

    - name: Install ALSA dev headers (Linux)
      if: runner.os == 'Linux'
      run: sudo apt-get update && sudo apt-get install -y libasound2-dev

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: '1.26.0'
        cache-dependency-path: |
          runtime/go.sum
          sdk/go.sum
          pkg/go.sum
          server/a2a/go.sum

    - name: Run golangci-lint in ${{ matrix.module }}
      uses: golangci/golangci-lint-action@v9
      with:
        version: v2.12.2
        working-directory: ${{ matrix.module }}
        args: --issues-exit-code=0
        only-new-issues: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  
  build:
    name: Build
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    
    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: '1.26.0'
    
    - name: Build runtime components
      run: make build

    - name: Check foundational packages are purego-free (issue #1536)
      run: ./scripts/check-no-audio-device-leak.sh

  perf-regression:
    name: Performance Regression Check
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: '1.26.0'

    - name: Build benchmark binaries
      run: |
        go build -C benchmarks -o ../bin/mockupstream ./mockupstream/
        go build -C benchmarks -o ../bin/harness ./harness/
        go build -o bin/bench-promptkit ./benchmarks/frameworks/promptkit/round1/

    - name: Run performance benchmark
      run: |
        # Start mock upstream with fast profile
        bin/mockupstream --profile benchmarks/profiles/fast.yaml &
        sleep 1

        # Start PromptKit benchmark server and capture its PID
        OPENAI_BASE_URL=http://localhost:8081/v1 OPENAI_API_KEY=bench \
          bin/bench-promptkit --pack benchmarks/frameworks/promptkit/round1/chat.pack.json &
        PK_PID=$!
        sleep 1

        # Verify services are up
        curl -sf http://localhost:8081/health > /dev/null
        curl -sf http://localhost:8090/health > /dev/null

        # Run benchmark: 500 concurrent, 5000 requests, with resource sampling
        RESULT=$(bin/harness --round round1 --target http://localhost:8090 \
          --framework promptkit --concurrency 500 --requests 5000 \
          --framework-pid $PK_PID \
          --output /tmp/bench-results 2>&1)

        echo "$RESULT"

        # Extract metrics from the markdown table row (first match only)
        # Format: | promptkit | 500 | p50 | p99 | 1639.52 req/s | 181.4 MB |
        TABLE_ROW=$(echo "$RESULT" | grep '^| promptkit' | head -1)
        RPS=$(echo "$TABLE_ROW" | grep -oP '[\d.]+(?= req/s)')
        RSS=$(echo "$TABLE_ROW" | grep -oP '[\d.]+(?= MB)')
        # CPU from cost summary: | promptkit | 500 | 1788 | 181 MB | 102.6% | ...
        COST_ROW=$(echo "$RESULT" | grep '^| promptkit.*%' | head -1)
        CPU=$(echo "$COST_ROW" | grep -oP '[\d.]+(?=%)' | head -1)

        echo "Measured: ${RPS} req/s, ${RSS} MB RSS, ${CPU}% CPU"

        # Assert throughput floor (CI runners produce ~1640 rps)
        FLOOR_RPS=1300
        if [ "$(echo "$RPS < $FLOOR_RPS" | bc -l)" = "1" ]; then
          echo "::error::Throughput regression: ${RPS} req/s < ${FLOOR_RPS} req/s"
          exit 1
        fi

        # Assert memory ceiling (500 concurrent should stay under 512 MB)
        CEIL_RSS=512
        if [ -n "$RSS" ] && [ "$(echo "$RSS > $CEIL_RSS" | bc -l)" = "1" ]; then
          echo "::error::Memory regression: ${RSS} MB > ${CEIL_RSS} MB ceiling"
          exit 1
        fi

        # Assert CPU ceiling — CI runners saw 102.6% at 500 concurrent.
        # Allow up to 150% (1.5 cores) to account for runner variance.
        CEIL_CPU=150
        if [ -n "$CPU" ] && [ "$(echo "$CPU > $CEIL_CPU" | bc -l)" = "1" ]; then
          echo "::error::CPU regression: ${CPU}% > ${CEIL_CPU}% ceiling"
          exit 1
        fi

        echo "✓ Performance check passed: ${RPS} req/s, ${RSS} MB, ${CPU}% CPU"

