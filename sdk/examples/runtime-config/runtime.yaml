apiVersion: promptkit.altairalabs.ai/v1alpha1
kind: RuntimeConfig
metadata:
  name: development
spec:
  # ── Provider ────────────────────────────────────────────────────
  # Uses mock provider for this example. Replace with a real provider
  # (claude, openai, etc.) and set the credential env var.
  providers:
    - id: mock
      type: mock
      model: mock-model

  # ── Exec Tools ──────────────────────────────────────────────────
  # Bind the pack's "sentiment_analysis" tool to a Python script.
  # The runtime spawns the script per invocation, passing tool args
  # as JSON on stdin and reading the result from stdout.
  tools:
    sentiment_analysis:
      exec:
        command: python3
        args: [./tools/sentiment.py]
        timeout_ms: 5000

  # ── Exec Evals ──────────────────────────────────────────────────
  # Bind pack eval type names to external scripts. The pack defines
  # evals by type name; the RuntimeConfig binds those names to
  # implementations. The pack never knows whether it's Go or Python.
  evals:
    tone_check:
      command: python3
      args: [./evals/tone-check.py]
      timeout_ms: 5000

    response_quality:
      command: python3
      args: [./evals/response-quality.py]
      timeout_ms: 5000

  # ── External Hooks ──────────────────────────────────────────────
  # Hooks intercept the pipeline at defined phases.
  # - filter mode: fail-closed (process failure = deny)
  # - observe mode: fire-and-forget (never blocks the pipeline)
  hooks:
    content_policy:
      command: python3
      args: [./hooks/content-policy.py]
      hook: provider
      phases: [after_call]
      mode: filter
      timeout_ms: 3000

    audit_logger:
      command: python3
      args: [./hooks/audit-logger.py]
      hook: session
      phases: [session_start, session_end]
      mode: observe

  # ── Logging ─────────────────────────────────────────────────────
  logging:
    defaultLevel: info
    format: text
