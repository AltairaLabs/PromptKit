# yaml-language-server: $schema=https://promptkit.altairalabs.ai/schemas/latest/tool.json
apiVersion: promptkit.altairalabs.ai/v1alpha1
kind: Tool
metadata:
  name: lookup_order
spec:
  name: lookup_order
  description: Look up an order by its order ID. Returns order details including item, purchase date, and warranty status.
  input_schema:
    type: object
    properties:
      order_id:
        type: string
        description: The order ID provided by the customer (e.g., ORD-2024-1234)
    required:
      - order_id
  output_schema:
    type: object
    properties:
      order_id:
        type: string
      customer_email:
        type: string
      item:
        type: string
      purchase_date:
        type: string
      status:
        type: string
  mode: mock
  timeout_ms: 1000
  mock_result:
    order_id: ORD-2023-7788
    customer_email: customer@example.com
    item: TechCorp Wireless Headphones
    purchase_date: "2023-08-12"
    status: delivered
