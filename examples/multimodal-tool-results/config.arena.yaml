apiVersion: promptkit.altairalabs.ai/v1alpha1
kind: Arena
metadata:
  name: multimodal-tool-results
spec:
  prompt_configs:
    - id: data-viz
      file: prompts/data-viz.yaml

  providers:
    - file: providers/mock-provider.yaml

  scenarios:
    - file: scenarios/chart-generation.scenario.yaml

  tools:
    - file: tools/generate-chart.tool.yaml

  defaults:
    temperature: 0.7
    max_tokens: 1000
    seed: 42
    concurrency: 1
    output:
      dir: out
      formats: ["json", "html"]
      html:
        file: report.html
