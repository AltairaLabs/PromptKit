apiVersion: promptkit.altairalabs.ai/v1alpha1
kind: Arena
metadata:
  name: codegen-agent-test-mock
  annotations:
    description: |
      Wiring check: mock provider scripts tool calls; Docker executes them for real (only the LLM is faked).
      Proves gates fire and discriminate without API spend.
      Run:
        make build-codegen-agent-sandbox
        cd examples/test-a-codegen-agent
        promptarena run -c mock.arena.yaml --ci --format html,json
spec:
  prompt_configs:
    - id: authoring-agent
      file: prompts/authoring-agent.yaml
  providers:
    - file: providers/mock-provider.yaml
  scenarios:
    - file: scenarios/refund-assistant.mock.scenario.yaml
    - file: scenarios/refund-broken.mock.scenario.yaml
  mcp_servers:
    - name: sandbox
      source: docker
      scope: session
      source_args:
        image: codegen-agent-sandbox:local
        api_port: 8090
        env:
          DEV_MODE: "1"
  defaults:
    output:
      dir: out-mock
      formats: ["json"]
