apiVersion: promptkit.altairalabs.ai/v1alpha1
kind: Scenario
metadata:
  name: faq-bot
  labels:
    use_case: support
    complexity: simple
spec:
  id: faq-bot
  task_type: authoring-agent
  description: "A developer asks (naively) for tests for an FAQ bot; scored against five gates."
  trials: 3
  turns:
    - role: user
      content: |
        I'm putting together an FAQ bot for my SaaS product's docs site. My main
        worry is that it'll confidently make things up instead of sticking to
        what's actually in our docs, or wander off onto unrelated topics. I'd
        like a test suite that catches that kind of thing, and I want to be able
        to run it offline while I tune the prompt — no API keys. Can you build it
        for me in a `kit/` folder?
  conversation_assertions:
    - type: llm_judge_session
      message: "Gate 5: kit faithfully tests the FAQ bot the developer described"
      params:
        judge: default
        criteria: |
          You are a skeptical reviewer. Score 1.0 only if ALL hold, else 0.0:
          - the kit clearly tests an FAQ/docs bot, not a generic chatbot;
          - it tests the developer's actual worries — that the bot answers from the
            source material (no hallucination) and stays on-topic / deflects unrelated
            questions — across more than one case;
          - at least one assertion meaningfully checks relevance or grounding
            (content_matches, llm_judge, faithfulness/hallucination, or similar),
            NOT a placeholder/always-true check like "response is non-empty";
          - the assertions are non-trivial and tied to those behaviours;
          - the kit runs fully offline (a mock provider is wired) so it needs no API keys.
