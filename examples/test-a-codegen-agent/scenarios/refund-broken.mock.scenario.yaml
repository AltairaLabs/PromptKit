apiVersion: promptkit.altairalabs.ai/v1alpha1
kind: Scenario
metadata:
  name: refund-broken-mock
  labels:
    use_case: support
    complexity: simple
spec:
  id: refund-broken-mock
  task_type: authoring-agent
  description: "Mock wiring check: scripted agent scaffolds a deliberately broken kit; the inverted assertion proves the harness detects the failure."
  turns:
    - role: user
      content: "Scaffold a minimal refund kit under /workspace/kit."
  conversation_assertions:
    - type: tool_exec
      message: "Broken kit must FAIL promptarena run (negation exits 0)"
      params:
        tool: Bash
        timeout_seconds: 120
        success_pattern: "__GATE_OK__"
        args:
          description: "verify broken kit fails promptarena run"
          command: "cd /workspace/kit && ! promptarena run --ci && echo __GATE_OK__"
