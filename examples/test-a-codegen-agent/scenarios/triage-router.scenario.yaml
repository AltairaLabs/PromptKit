apiVersion: promptkit.altairalabs.ai/v1alpha1
kind: Scenario
metadata:
  name: triage-router
  labels:
    use_case: workflow
    complexity: hard
spec:
  id: triage-router
  task_type: authoring-agent
  description: "A developer asks (naively) for tests for a support-triage router; scored against five gates."
  trials: 3
  turns:
    - role: user
      content: |
        I'm building an AI step that triages incoming support messages and routes
        each one to the right team — billing, technical, or general. The thing I
        need to be confident about is that it routes correctly: a billing question
        actually goes to billing, a technical one to technical, and so on. I'd
        like a test suite that proves that, and I want to run it locally without
        hitting any APIs while I'm developing. Can you put it together in a `kit/`
        folder?
  conversation_assertions:
    - type: llm_judge_session
      message: "Gate 5: kit faithfully tests the triage router the developer described"
      params:
        judge: default
        criteria: |
          You are a skeptical reviewer. Score 1.0 only if ALL hold, else 0.0:
          - the kit clearly tests a support-triage router, not a generic chatbot;
          - it actually verifies routing to each of the developer's three destinations
            — billing, technical, and general (or clearly equivalent) — with a case per route;
          - the routing checks are real (they assert the chosen route/state/transition,
            e.g. workflow_state or transitioned_to), NOT just that some text came back
            or placeholder/always-true checks;
          - the assertions are non-trivial and tied to the routing behaviour;
          - the kit runs fully offline (a mock provider is wired) so it needs no API keys.
