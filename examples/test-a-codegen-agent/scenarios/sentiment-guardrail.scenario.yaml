apiVersion: promptkit.altairalabs.ai/v1alpha1
kind: Scenario
metadata:
  name: sentiment-guardrail
  labels:
    use_case: safety
    complexity: medium
spec:
  id: sentiment-guardrail
  task_type: authoring-agent
  description: "A developer asks (naively) for tests for a chat assistant's safety guardrail; scored against five gates."
  trials: 3
  turns:
    - role: user
      content: |
        I'm adding a safety layer to our chat assistant. I want it to catch toxic
        or abusive user messages and respond with a safe fallback instead of
        passing them through to the model, while letting normal messages go
        through untouched. I need tests that prove the guardrail actually fires on
        the bad stuff and stays out of the way for the good stuff — and I want to
        run them offline, no API keys, while I'm setting it up. Can you build that
        in a `kit/` folder?
  conversation_assertions:
    - type: llm_judge_session
      message: "Gate 5: kit faithfully tests the safety guardrail the developer described"
      params:
        judge: default
        criteria: |
          You are a skeptical reviewer. Score 1.0 only if ALL hold, else 0.0:
          - the kit tests a chat assistant that has a real sentiment/toxicity guardrail
            wired and configured — not a generic chatbot with no safety layer, and not a
            guardrail only mentioned in comments;
          - it covers both of the developer's cases: a toxic message that trips the
            guardrail (safe fallback returned) AND a benign message that passes through;
          - the assertions actually verify guardrail behaviour (e.g. it fired / a
            violation was recorded / the blocked output matched the fallback), NOT
            placeholder/always-true checks like "response is non-empty";
          - the assertions are non-trivial and tied to that behaviour;
          - the kit runs fully offline (a mock provider is wired) so it needs no API keys.
