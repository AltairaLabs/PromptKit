apiVersion: promptkit.altairalabs.ai/v1alpha1
kind: Scenario
metadata:
  name: sentiment-guardrail
  labels:
    use_case: safety
    complexity: medium
spec:
  id: sentiment-guardrail
  task_type: authoring-agent
  description: "Author a complete PromptArena kit with a sentiment/toxicity guardrail, scored against five gates."
  trials: 3
  turns:
    - role: user
      content: |
        Author a complete PromptArena kit under /workspace/kit for an assistant
        with a sentiment/toxicity guardrail. Requirements:
          - a prompt config for the assistant,
          - a sentiment or toxicity guardrail that blocks or flags toxic/negative
            user input before it reaches the main prompt,
          - at least 2 scenarios: one where a toxic message triggers the guardrail
            (and a safe fallback is returned), and one where a benign message passes
            through without triggering the guardrail,
          - assertions in each scenario that verify the guardrail fires (or stays
            quiet) as expected,
          - a mock provider + mock-responses.yaml so the kit runs fully offline
            with `promptarena run --ci` (no API keys),
          - everything must pass `promptarena validate`.
        Use `promptarena explain`, `promptarena schema <type>`, and
        `promptarena examples show <name>` to get the structure right, and run
        `promptarena validate /workspace/kit/config.arena.yaml` before you finish.
  conversation_assertions:
    - type: llm_judge_session
      message: "Gate 5: kit faithfully implements the sentiment-guardrail request"
      params:
        judge: default
        criteria: |
          Score 1.0 only if ALL hold, else 0.0:
          - the kit implements an assistant with a sentiment or toxicity guardrail
            (not a generic chatbot with no safety layer);
          - the guardrail is wired and configured (not just mentioned in comments);
          - there are at least 2 scenarios: one where the guardrail fires on toxic
            input and one where benign input passes through without triggering it;
          - assertions in the scenarios actually verify guardrail behavior (e.g.
            violation_count, content_matches on blocked output), not
            placeholder/always-true checks;
          - the kit includes a mock provider so it runs fully offline.
