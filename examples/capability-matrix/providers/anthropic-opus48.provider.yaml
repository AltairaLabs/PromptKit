apiVersion: promptkit.altairalabs.ai/v1alpha1
kind: Provider
metadata:
  name: anthropic-opus48
spec:
  id: anthropic-opus48
  type: claude
  model: claude-opus-4-8
  capabilities:
    - text
    - streaming
    - vision
    - tools
    - json
    - documents
  defaults:
    temperature: 0.1
    top_p: 1.0
    max_tokens: 100
  pricing:
    input_cost_per_1k: 0.005
    output_cost_per_1k: 0.025
  stream_retry:
    enabled: true
    max_attempts: 3
