apiVersion: promptkit.altairalabs.ai/v1alpha1
kind: Provider
metadata:
  name: openai-gpt5-mini
spec:
  id: openai-gpt5-mini
  type: openai
  model: gpt-5-mini
  capabilities:
    - text
    - streaming
    - tools
    - json
  unsupported_params:
    - temperature
    - top_p
  defaults:
    temperature: 0.1
    max_tokens: 50
    top_p: 1.0
  pricing:
    input_cost_per_1k: 0.00075
    output_cost_per_1k: 0.003
